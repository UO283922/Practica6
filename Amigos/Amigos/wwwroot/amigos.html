<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Amigos REST</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-2.0.3.min.js"></script>
</head>
<body class="bg-light">

    <div class="container mt-4">
        <h1 class="mb-4">Gestión de Amigos</h1>

        <div class="card mb-4">
            <div class="card-header">Formulario</div>
            <div class="card-body">
                <input type="hidden" id="amigoId" />

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" id="name" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Longitud</label>
                    <input type="text" id="longi" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Latitud</label>
                    <input type="text" id="lati" class="form-control" />
                </div>

                <button class="btn btn-primary me-2" onclick="saveAmigo()">Guardar</button>
                <button class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Lista de amigos</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Longitud</th>
                            <th>Latitud</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="amigosBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        var uri = "/api/amigo";

        $(document).ready(function () {
            loadAmigos();
        });

        function loadAmigos() {
            $.getJSON(uri, function (data) {
                var body = $("#amigosBody");
                body.empty();

                $.each(data, function (key, item) {
                    var row =
                        "<tr>" +
                        "<td>" + item.id + "</td>" +
                        "<td>" + item.name + "</td>" +
                        "<td>" + item.longi + "</td>" +
                        "<td>" + item.lati + "</td>" +
                        "<td>" +
                        "<button class='btn btn-sm btn-warning me-2' onclick='editAmigo(" + item.id + ")'>Editar</button>" +
                        "<button class='btn btn-sm btn-danger' onclick='deleteAmigo(" + item.id + ")'>Borrar</button>" +
                        "</td>" +
                        "</tr>";

                    body.append(row);
                });
            }).fail(function () {
                alert("Error al cargar la lista de amigos");
            });
        }

        function saveAmigo() {
            var id = $("#amigoId").val();

            var amigo = {
                id: id ? parseInt(id) : 0,
                name: $("#name").val(),
                longi: $("#longi").val(),
                lati: $("#lati").val()
            };

            if (!amigo.name || !amigo.longi || !amigo.lati) {
                alert("Rellena todos los campos");
                return;
            }

            if (id === "") {
                $.ajax({
                    url: uri,
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(amigo),
                    success: function () {
                        clearForm();
                        loadAmigos();
                    },
                    error: function () {
                        alert("Error al crear el amigo");
                    }
                });
            } else {
                $.ajax({
                    url: uri + "/" + id,
                    type: "PUT",
                    contentType: "application/json",
                    data: JSON.stringify(amigo),
                    success: function () {
                        clearForm();
                        loadAmigos();
                    },
                    error: function () {
                        alert("Error al modificar el amigo");
                    }
                });
            }
        }

        function editAmigo(id) {
            $.getJSON(uri + "/" + id, function (item) {
                $("#amigoId").val(item.id);
                $("#name").val(item.name);
                $("#longi").val(item.longi);
                $("#lati").val(item.lati);
            }).fail(function () {
                alert("Error al obtener el amigo");
            });
        }

        function deleteAmigo(id) {
            $.ajax({
                url: uri + "/" + id,
                type: "DELETE",
                success: function () {
                    loadAmigos();
                },
                error: function () {
                    alert("Error al borrar el amigo");
                }
            });
        }

        function clearForm() {
            $("#amigoId").val("");
            $("#name").val("");
            $("#longi").val("");
            $("#lati").val("");
        }
    </script>

</body>
</html>
